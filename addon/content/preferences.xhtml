<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml"
      onload="Zotero.ZoteroPDFHighlighter.hooks.onPrefsLoad(event)">

  <!-- Script loaded via PreferencePanes.register scripts array for Zotero 8 compatibility -->

  <groupbox>
    <label><html:h2>🔬 PDF Highlighter — LLM Settings</html:h2></label>

    <hbox align="center">
      <label value="API Key:" style="width: 80px;"/>
      <html:input type="password"
                  id="pref-apiKey"
                  preference="extensions.zotero-pdf-highlighter.apiKey"
                  style="flex: 1;"/>
    </hbox>

    <hbox align="center">
      <label value="Base URL:" style="width: 80px;"/>
      <html:input type="text"
                  id="pref-baseURL"
                  preference="extensions.zotero-pdf-highlighter.baseURL"
                  style="flex: 1;"/>
    </hbox>

    <hbox align="center">
      <label value="Model:" style="width: 80px;"/>
      <html:input type="text"
                  id="pref-model"
                  preference="extensions.zotero-pdf-highlighter.model"
                  style="flex: 1;"/>
    </hbox>

    <separator class="thin"/>
  </groupbox>

  <groupbox>
    <label><html:strong data-l10n-id="pref-system-prompt-label">System Prompt</html:strong></label>
    <html:textarea id="pref-systemPrompt" rows="10" style="width: 100%; font-family: monospace; font-size: 12px;"/>

    <separator class="thin"/>
    <description style="font-size: 11px; color: #666;">
      Leave this blank to use the built-in default prompt shown in the field. Any saved text here overrides the runtime system prompt exactly.
    </description>
  </groupbox>

  <groupbox>
    <label><html:h3>Entity Types &amp; Colors</html:h3></label>
    <description style="font-size: 11px;">
      🔵 METHOD · 🟠 DATASET · 🔴 METRIC · 🟢 TASK · 🟡 PERSON · 🟣 MATERIAL · 💜 INSTITUTION · ⚪ TERM
    </description>
  </groupbox>
</vbox>
